<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Manager</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../shared/shell.css?v=071726j">
    <link rel="stylesheet" href="access-manager.css?v=071726d">
</head>
<body>
    <header class="shell-header">
        <div class="shell-header__inner">
            <div class="shell-brand">
                <h1>Access Manager</h1>
                <p>Unified sections, scripts, and grants</p>
            </div>
            <p class="shell-user" id="shellUser" hidden>
                Signed in as <strong id="shellUserName"></strong>
                <button type="button" id="logoutButton">Sign out</button>
            </p>
            <div id="pilotToolNav"></div>
        </div>
    </header>

    <div class="admin-layout" id="adminLayout">
        <aside class="admin-menu" id="adminMenu" aria-label="Primary navigation"></aside>
        <main class="shell-main" id="appMain">
            <div id="appMessage" class="message error" role="alert" hidden></div>
            <div id="viewSections" data-view-panel="sections"></div>
        </main>
    </div>

    <footer class="shell-footer">
        <div class="shell-footer__inner">
            <span>Admin Shell Pilot</span>
        </div>
    </footer>

    <script src="../shared/api-client.js"></script>
    <script src="../shared/session.js"></script>
    <script src="../shared/dialogs.js"></script>
    <script src="../shared/shell.js?v=071726j"></script>
    <script src="js/state.js?v=071726c"></script>
    <script src="js/reorder.js?v=071726b"></script>
    <script src="js/sections-view.js?v=071726f"></script>
    <script src="js/app.js?v=071726g"></script>
</body>
</html>
